<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="mystyle.css">
    <title>Calculator</title>
</head>
<body bgcolor="black">
    <h1>Basic Calculator</h1>
    <form id="myform" name="calc">
        <input name="display" style="width: 675px; height: 100px; text-align: center;background-color: bisque;" >
        <br/>
        <input type="button" value="0" onclick="calc.display.value+='0'">
        <input type="button" value="1" onclick="calc.display.value+='1'">
        <input type="button" value="2" onclick="calc.display.value+='2'">
        <input type="button" value="+" onclick="calc.display.value+='+'" style="background-color: rgb(69, 68, 68);"><br/>
        <input type="button" value="3"  onclick="calc.display.value+='3'" >
        <input type="button" value="4"  onclick="calc.display.value+='4'" >
        <input type="button" value="5"  onclick="calc.display.value+='5'" >
        <input type="button" value="-"  onclick="calc.display.value+='-'"  style="background-color: rgb(69, 68, 68);"><br/>
        <input type="button" value="6"  onclick="calc.display.value+='6'" >
        <input type="button" value="7"  onclick="calc.display.value+='7'" >
        <input type="button" value="8"  onclick="calc.display.value+='8'" >
        <input type="button" value="x"  onclick="calc.display.value+='*'"  style="background-color: rgb(69, 68, 68);"><br/>
        <input type="button" value="9"  onclick="calc.display.value+='9'" >
        <input type="button" value="C"  onclick="calc.display.value=''"  style="background-color: rgb(48, 225, 245);">
        <input type="button" value="="  onclick="calc.display.value=eval(calc.display.value)"  style="background-color: rgb(226, 12, 12);">
        <input type="button" value="&#247;"  onclick="calc.display.value+='/'"  style="background-color: rgb(69, 68, 68);">
        
    </form>    

    
</body>
</html>
